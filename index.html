<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Predictor v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   THEME VARIABLES
═══════════════════════════════════════════ */
[data-theme="dark"] {
  --bg:       #080808;
  --bg2:      #0f0f0f;
  --bg3:      #171717;
  --bg4:      #202020;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #f0f0f0;
  --text2:    #777;
  --text3:    #383838;
  --shadow:   rgba(0,0,0,0.6);
  --sidebar-bg: #0a0a0a;
}
[data-theme="light"] {
  --bg:       #f4f4f2;
  --bg2:      #ffffff;
  --bg3:      #ebebea;
  --bg4:      #e0e0de;
  --border:   rgba(0,0,0,0.08);
  --border2:  rgba(0,0,0,0.14);
  --text:     #111111;
  --text2:    #666;
  --text3:    #bbb;
  --shadow:   rgba(0,0,0,0.12);
  --sidebar-bg: #eeeeec;
}

:root {
  --green:      #00e676;
  --green-dim:  rgba(0,230,118,0.1);
  --green-b:    rgba(0,230,118,0.22);
  --red:        #ff4444;
  --red-dim:    rgba(255,68,68,0.1);
  --amber:      #ffb300;
  --amber-dim:  rgba(255,179,0,0.1);
  --blue:       #29b6f6;
  --blue-dim:   rgba(41,182,246,0.1);
  --purple:     #ab47bc;
  --purple-dim: rgba(171,71,188,0.1);
  --sidebar-w:  220px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s, color 0.3s;
}

/* ═══════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════ */
.topbar {
  position: fixed;
  top: 0; left: var(--sidebar-w); right: 0;
  height: 56px;
  z-index: 200;
  background: var(--bg);
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  transition: background 0.3s;
}
.topbar-search {
  flex: 1;
  max-width: 440px;
  display: flex;
  gap: 8px;
}
.search-input {
  flex: 1;
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, background 0.3s;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: rgba(0,230,118,0.35); }
.search-btn {
  background: var(--green);
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 0.1em;
  color: #080808;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.search-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
.search-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.refresh-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.06em;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--green); color: var(--green); }
.refresh-btn.spinning .r-icon { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.r-icon { display: inline-block; transition: transform 0.3s; }

/* Theme switch */
.theme-switch {
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  user-select: none;
}
.theme-icon { font-size: 14px; }
.toggle-track {
  width: 38px; height: 20px;
  background: var(--bg4);
  border-radius: 10px;
  border: 0.5px solid var(--border2);
  position: relative;
  transition: all 0.3s;
}
[data-theme="light"] .toggle-track { background: var(--green-dim); border-color: var(--green-b); }
.toggle-thumb {
  position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--text3);
  transition: all 0.3s;
}
[data-theme="light"] .toggle-thumb { left: 20px; background: var(--green); }

.live-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--green);
  letter-spacing: 0.1em;
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.25;} }

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--bg4) transparent;
  z-index: 300;
  transition: background 0.3s;
}
.sidebar-logo {
  padding: 18px 20px 16px;
  border-bottom: 0.5px solid var(--border);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.12em;
  flex-shrink: 0;
}
.sidebar-logo span { color: var(--green); }

.sidebar-section-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  color: var(--text3);
  text-transform: uppercase;
  padding: 16px 20px 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  user-select: none;
}
.nav-item:hover { color: var(--text); background: var(--bg3); }
.nav-item.active { color: var(--green); border-left-color: var(--green); background: var(--green-dim); }
.nav-flag { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-label { flex: 1; }
.nav-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  background: var(--bg3);
  color: var(--text3);
}
.nav-item.active .nav-count { background: var(--green-dim); color: var(--green); }

.sidebar-divider { height: 0.5px; background: var(--border); margin: 8px 16px; }

/* ═══════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════ */
.main {
  margin-left: var(--sidebar-w);
  padding-top: 56px;
  min-height: 100vh;
}
.page { display: none; padding: 28px 32px; max-width: 1100px; }
.page.active { display: block; animation: fadeUp 0.25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }

/* ═══════════════════════════════════════════
   SECTION TITLES
═══════════════════════════════════════════ */
.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 0.06em;
  color: var(--text);
  margin-bottom: 4px;
}
.page-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

/* ═══════════════════════════════════════════
   MATCH CARDS — TODAY
═══════════════════════════════════════════ */
.matches-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}
.match-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
}
.match-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 28px var(--shadow); }

.mc-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px;
  border-bottom: 0.5px solid var(--border);
}
.mc-league-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.07em;
  color: var(--text3);
  text-transform: uppercase;
}
.mc-time-wrap { display: flex; align-items: center; gap: 6px; }
.mc-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
.live-pill {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.06em;
  background: var(--red);
  color: #fff;
  padding: 2px 7px;
  border-radius: 4px;
  animation: livePulse 1s infinite;
}
@keyframes livePulse { 0%,100%{opacity:1;} 50%{opacity:.6;} }

.mc-body { padding: 14px; }
.mc-teams {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}
.mc-team { flex: 1; }
.mc-team.right { text-align: right; }
.mc-name { font-family: 'Bebas Neue', sans-serif; font-size: 21px; letter-spacing: 0.04em; color: var(--text); }
.mc-full { font-size: 11px; color: var(--text2); margin-top: 1px; }
.mc-live-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 0.04em;
  color: var(--red);
  text-align: center;
  flex-shrink: 0;
}
.mc-vs { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); flex-shrink: 0; }
.mc-minute { font-size: 10px; color: var(--red); text-align: center; margin-top: 2px; font-family: 'DM Mono', monospace; }

/* Proba bar mini */
.mc-proba { display: flex; gap: 2px; height: 4px; border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
.p-h { background: var(--blue); }
.p-d { background: var(--text3); }
.p-a { background: var(--red); }

/* Verdict badge */
.mc-verdict-wrap { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.verdict-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
}
.vb-home { background: var(--blue-dim); color: var(--blue); border: 0.5px solid rgba(41,182,246,0.2); }
.vb-draw { background: var(--bg3); color: var(--text2); border: 0.5px solid var(--border2); }
.vb-away { background: var(--red-dim); color: var(--red); border: 0.5px solid rgba(255,68,68,0.2); }
.vb-icon { font-size: 11px; }

.mc-pcts {
  display: flex;
  gap: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
}
.pct-h { color: var(--blue); }
.pct-d { color: var(--text2); }
.pct-a { color: var(--red); }

/* ═══════════════════════════════════════════
   STANDINGS TABLE
═══════════════════════════════════════════ */
.standings-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--bg2);
  border-radius: 14px;
  overflow: hidden;
  border: 0.5px solid var(--border);
  margin-bottom: 28px;
}
.standings-table th {
  padding: 11px 14px;
  text-align: left;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text3);
  text-transform: uppercase;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg3);
}
.standings-table th.num { text-align: center; width: 40px; }
.standings-table th.pts { text-align: center; }
.standings-table td {
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text2);
  border-bottom: 0.5px solid var(--border);
  transition: background 0.15s;
}
.standings-table tr:last-child td { border-bottom: none; }
.standings-table tr:hover td { background: var(--bg3); }
.standings-table tr { cursor: pointer; }
.s-pos { text-align: center; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); }
.s-pos.top3 { color: var(--green); font-weight: 500; }
.s-pos.ucl { color: var(--blue); }
.s-pos.uecl { color: var(--amber); }
.s-pos.rel { color: var(--red); }
.s-team-cell { display: flex; align-items: center; gap: 10px; }
.s-team-logo {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  border: 0.5px solid var(--border);
}
.s-team-name { font-weight: 400; color: var(--text); }
.s-num { text-align: center; font-family: 'DM Mono', monospace; font-size: 12px; }
.s-pts { text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.04em; color: var(--text); }
.s-form { display: flex; gap: 3px; align-items: center; }
.sf-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
}
.sf-w { background: var(--green); }
.sf-d { background: var(--amber); }
.sf-l { background: var(--red); }

/* Zone legend */
.zone-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.zl-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.zl-dot { width: 8px; height: 8px; border-radius: 2px; }

/* ═══════════════════════════════════════════
   TEAM PAGE
═══════════════════════════════════════════ */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  padding: 0;
  margin-bottom: 20px;
  transition: color 0.2s;
}
.back-btn:hover { color: var(--green); }

.team-hero {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  padding: 24px 28px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 24px;
}
.team-hero-logo {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  border: 0.5px solid var(--border2);
  flex-shrink: 0;
}
.team-hero-name { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 0.04em; }
.team-hero-league { font-size: 13px; color: var(--text2); margin-top: 2px; }
.team-hero-stats { display: flex; gap: 20px; margin-left: auto; }
.ths-item { text-align: center; }
.ths-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.03em; }
.ths-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; }

/* Calendar */
.cal-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.cal-filter {
  padding: 6px 14px;
  border-radius: 100px;
  border: 0.5px solid var(--border2);
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--text2);
  cursor: pointer;
  background: var(--bg2);
  transition: all 0.15s;
  letter-spacing: 0.04em;
}
.cal-filter:hover { color: var(--text); }
.cal-filter.active { background: var(--green-dim); border-color: var(--green-b); color: var(--green); }

.cal-comp { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; white-space: nowrap; }
.comp-l1   { background:rgba(255,179,0,.12);   color:var(--amber); border:0.5px solid rgba(255,179,0,.25); }
.comp-pl   { background:rgba(41,182,246,.1);   color:var(--blue);  border:0.5px solid rgba(41,182,246,.2); }
.comp-liga { background:rgba(255,68,68,.1);    color:var(--red);   border:0.5px solid rgba(255,68,68,.2); }
.comp-sa   { background:rgba(171,71,188,.1);   color:var(--purple);border:0.5px solid rgba(171,71,188,.2); }
.comp-bl   { background:rgba(0,230,118,.08);   color:var(--green); border:0.5px solid rgba(0,230,118,.18); }
.comp-jpl  { background:rgba(255,68,68,.1);    color:#ff7043;      border:0.5px solid rgba(255,112,67,.2); }
.comp-ucl  { background:rgba(41,182,246,.12);  color:#64b5f6;      border:0.5px solid rgba(100,181,246,.2); }
.comp-uel  { background:rgba(255,179,0,.1);    color:var(--amber); border:0.5px solid rgba(255,179,0,.2); }
.comp-cup  { background:rgba(171,71,188,.1);   color:var(--purple);border:0.5px solid rgba(171,71,188,.2); }
.comp-nat  { background:rgba(0,230,118,.08);   color:var(--green); border:0.5px solid rgba(0,230,118,.18); }

.cal-list { display: flex; flex-direction: column; gap: 4px; }
.cal-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  transition: all 0.15s;
  cursor: pointer;
}
.cal-row:hover { border-color: var(--border2); background: var(--bg3); }
.cal-row.future { opacity: 0.75; }
.cal-row.live-row { border-color: rgba(255,68,68,0.3); background: rgba(255,68,68,0.04); }
.cal-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); min-width: 72px; }
.cal-teams { flex: 1; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.cal-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 0.04em;
  min-width: 52px;
  text-align: center;
}
.score-win  { color: var(--green); }
.score-draw { color: var(--text2); }
.score-loss { color: var(--red); }
.score-future { color: var(--text3); font-size: 14px; }
.cal-venue { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); min-width: 40px; text-align: center; }
.venue-h { color: var(--blue); }
.venue-a { color: var(--amber); }

/* ═══════════════════════════════════════════
   ANALYSIS PAGE
═══════════════════════════════════════════ */
.analysis-hero {
  background: var(--bg2);
  border: 0.5px solid var(--border2);
  border-radius: 16px;
  padding: 28px 32px;
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
}
.analysis-hero::after {
  content: '';
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 0.5px;
  background: var(--border);
}
.ah-top { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 22px; }
.ah-team { flex: 1; }
.ah-team.right { text-align: right; }
.ah-name { font-family: 'Bebas Neue', sans-serif; font-size: 46px; letter-spacing: 0.03em; line-height: 1; }
.ah-home .ah-name { color: var(--blue); }
.ah-away .ah-name { color: var(--red); }
.ah-full { font-size: 13px; color: var(--text2); margin-top: 3px; }
.ah-center { text-align: center; z-index: 1; flex-shrink: 0; }
.ah-vs { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: .15em; color: var(--text3); }
.ah-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); margin-top: 4px; }
.ah-live-score { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--red); margin: 4px 0; letter-spacing: 0.04em; }
.ah-minute { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--red); }

/* Big proba */
.bp-wrap { }
.bp-track { display: flex; height: 10px; border-radius: 5px; overflow: hidden; gap: 2px; margin-bottom: 12px; }
.bp-h { background: var(--blue); transition: width 1s ease; }
.bp-d { background: var(--text3); transition: width 1s ease; }
.bp-a { background: var(--red); transition: width 1s ease; }
.bp-labels { display: flex; justify-content: space-between; gap: 4px; }
.bp-item { display: flex; align-items: center; gap: 6px; }
.bp-dot { width: 8px; height: 8px; border-radius: 2px; }
.bp-lbl { font-size: 12px; color: var(--text2); }
.bp-pct { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .04em; margin-left: 3px; }
.pct-h { color: var(--blue); }
.pct-d { color: var(--text2); }
.pct-a { color: var(--red); }

/* Verdict */
.verdict-card {
  border-radius: 12px;
  padding: 18px 22px;
  margin-bottom: 18px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  border: 0.5px solid;
}
.vc-win-home { background: var(--blue-dim); border-color: rgba(41,182,246,0.25); }
.vc-win-away { background: var(--red-dim);  border-color: rgba(255,68,68,0.25); }
.vc-draw     { background: var(--bg3);      border-color: var(--border2); }
.vc-icon { font-size: 28px; flex-shrink: 0; }
.vc-tag { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 5px; }
.vc-win-home .vc-tag { color: var(--blue); }
.vc-win-away .vc-tag { color: var(--red); }
.vc-draw .vc-tag     { color: var(--text2); }
.vc-main { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
.vc-sub  { font-size: 13px; color: var(--text2); line-height: 1.7; }

/* Two col */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }

.analysis-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
}
.ac-team { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: .07em; margin-bottom: 12px; padding-bottom: 9px; border-bottom: 0.5px solid var(--border); }
.ac-home .ac-team { color: var(--blue); }
.ac-away .ac-team { color: var(--red); }

.f-item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; font-size: 13px; color: var(--text2); line-height: 1.55; border-bottom: 0.5px solid var(--border); }
.f-item:last-child { border-bottom: none; }
.f-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.f-g { background: var(--green); }
.f-r { background: var(--red); }
.f-a { background: var(--amber); }

/* Form dots */
.form-dots { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
.form-d { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; }
.fd-w { background: rgba(0,230,118,.12); color: var(--green); border: 0.5px solid var(--green-b); }
.fd-l { background: var(--red-dim); color: var(--red); border: 0.5px solid rgba(255,68,68,.2); }
.fd-d { background: var(--bg3); color: var(--text3); border: 0.5px solid var(--border); }
.form-note { font-size: 12px; color: var(--text2); line-height: 1.6; }

/* Absences */
.abs-player { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid var(--border); gap: 8px; }
.abs-player:last-child { border-bottom: none; }
.abs-name { font-size: 13px; color: var(--text); }
.abs-reason { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.imp { font-size: 9px; font-family: 'DM Mono', monospace; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; letter-spacing: 0.06em; }
.imp-h { background: var(--red-dim); color: var(--red); border: 0.5px solid rgba(255,68,68,.2); }
.imp-m { background: var(--amber-dim); color: var(--amber); border: 0.5px solid rgba(255,179,0,.2); }
.imp-l { background: var(--bg3); color: var(--text3); border: 0.5px solid var(--border); }

/* History */
.histo-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 18px; }
.h-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 0.5px solid var(--border); gap: 12px; transition: background .15s; }
.h-row:last-child { border-bottom: none; }
.h-row:hover { background: var(--bg3); }
.h-date  { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); min-width: 60px; }
.h-comp  { font-size: 11px; color: var(--text3); min-width: 90px; }
.h-teams { font-size: 13px; color: var(--text2); flex: 1; }
.h-score { font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: var(--text); min-width: 46px; text-align: center; }
.h-win   { font-size: 10px; font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 4px; }
.h-home  { background: var(--blue-dim); color: var(--blue); border: 0.5px solid rgba(41,182,246,.2); }
.h-away  { background: var(--red-dim);  color: var(--red);  border: 0.5px solid rgba(255,68,68,.2); }
.h-draw  { background: var(--bg3); color: var(--text3); border: 0.5px solid var(--border); }

/* Loading */
.loading-wrap { display: flex; flex-direction: column; align-items: center; padding: 80px 20px; gap: 16px; }
.spinner { width: 36px; height: 36px; border: 2px solid var(--bg3); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; }
.loading-text { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); letter-spacing: .08em; text-align: center; line-height: 2; }
.loading-step { color: var(--green); }

/* Disclaimer */
.disclaimer { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); text-align: center; padding: 24px; border-top: 0.5px solid var(--border); line-height: 1.9; letter-spacing: .04em; margin-top: 12px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; }
.es-icon { font-size: 42px; margin-bottom: 14px; }
.es-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: .08em; color: var(--text2); margin-bottom: 8px; }
.es-sub { font-size: 13px; color: var(--text3); line-height: 1.7; }

@media (max-width: 900px) {
  :root { --sidebar-w: 0px; }
  .sidebar { display: none; }
  .topbar { left: 0; }
  .two-col { grid-template-columns: 1fr; }
  .page { padding: 20px 16px; }
  .ah-name { font-size: 30px; }
}

<!-- ══════════════════════════

<main class="main">

  <div class="page active" id="page-today">

  <!-- STANDINGS -->
  <div class="page" id="page-standings">

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let currentPage = 'today';
let currentLeagueForBack = 'l1';
let liveInterval = null;
let currentAnalysisMatch = null;

const LEAGUES = {
  ucl:  { name:'Champions League', flag:'🏆', color:'#64b5f6' },
  l1:   { name:'Ligue 1',           flag:'🇫🇷', color:'#ffb300' },
  pl:   { name:'Premier League',    flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', color:'#29b6f6' },
  liga: { name:'La Liga',           flag:'🇪🇸', color:'#ff5252' },
  sa:   { name:'Serie A',           flag:'🇮🇹', color:'#ab47bc' },
  bl:   { name:'Bundesliga',        flag:'🇩🇪', color:'#00e676' },
  jpl:  { name:'Jupiler Pro',       flag:'🇧🇪', color:'#ff7043' },
  nat:  { name:'Nations League',    flag:'🌍', color:'#00e676' },
};

const COMP_CLASSES = {
  'Ligue 1':'comp-l1','Premier League':'comp-pl','La Liga':'comp-liga','Serie A':'comp-sa',
  'Bundesliga':'comp-bl','Jupiler Pro':'comp-jpl','Champions League':'comp-ucl',
  'Europa League':'comp-uel','Coupe de France':'comp-cup','FA Cup':'comp-cup',
  'Copa del Rey':'comp-cup','Nations League':'comp-nat','DFB Pokal':'comp-cup',
  'Coupe de Belgique':'comp-cup'
};

// Demo matches
const DEMO_MATCHES = [
  { id:1, league:'ucl', home:'PSG',        homeFull:'Paris Saint-Germain', away:'BAYERN',    awayFull:'FC Bayern München',   time:'21:00', homeProba:42, drawProba:24, awayProba:34, live:false },
  { id:2, league:'ucl', home:'ATL MADRID', homeFull:'Atlético de Madrid',  away:'ARSENAL',   awayFull:'Arsenal FC',          time:'21:00', homeProba:38, drawProba:26, awayProba:36, live:false },
  { id:3, league:'l1',  home:'MARSEILLE',  homeFull:'Olympique de Marseille', away:'MONACO', awayFull:'AS Monaco',           time:'20:45', homeProba:44, drawProba:25, awayProba:31, live:false },
  { id:4, league:'pl',  home:'LIVERPOOL',  homeFull:'Liverpool FC',        away:'MAN CITY',  awayFull:'Manchester City',     time:'17:30', homeProba:46, drawProba:23, awayProba:31, live:true, liveScore:'2-1', minute:'67' },
  { id:5, league:'liga',home:'REAL MADRID',homeFull:'Real Madrid CF',      away:'ATLETICO',  awayFull:'Atlético Madrid',     time:'21:00', homeProba:48, drawProba:22, awayProba:30, live:false },
  { id:6, league:'bl',  home:'DORTMUND',   homeFull:'Borussia Dortmund',   away:'LEIPZIG',   awayFull:'RB Leipzig',          time:'18:30', homeProba:41, drawProba:27, awayProba:32, live:false },
  { id:7, league:'sa',  home:'INTER',      homeFull:'FC Internazionale',   away:'JUVENTUS',  awayFull:'Juventus FC',         time:'20:45', homeProba:45, drawProba:24, awayProba:31, live:false },
  { id:8, league:'jpl', home:'BRUGES',     homeFull:'Club Brugge KV',      away:'ANDERLECHT',awayFull:'RSC Anderlecht',      time:'18:30', homeProba:43, drawProba:26, awayProba:31, live:false },
];

let allMatches = [...DEMO_MATCHES];

// ══════════════════════════════════════════
// THEME
// ══════════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
})();

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  if (navEl) navEl.classList.add('active');
  currentPage = id;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBackToStandings() {
  showPage('standings');
  showStandings(currentLeagueForBack, true);
}

// ══════════════════════════════════════════
// REFRESH
// ══════════════════════════════════════════
function doRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.querySelector('.r-icon').textContent = '↻';
  setTimeout(() => {
    btn.classList.remove('spinning');
    renderMatches();
    if (currentPage === 'standings') {
      // re-render current standings
    }
  }, 1200);
}

// ══════════════════════════════════════════
// TODAY MATCHES
// ══════════════════════════════════════════
function today() {
  return new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function getVerdictInfo(m) {
  const max = Math.max(m.homeProba, m.drawProba, m.awayProba);
  if (max === m.homeProba) return { label: `Victoire ${m.home}`, cls: 'vb-home', icon: '🔵' };
  if (max === m.awayProba) return { label: `Victoire ${m.away}`,  cls: 'vb-away', icon: '🔴' };
  return { label: 'Match nul probable', cls: 'vb-draw', icon: '⚖️' };
}

function renderMatches() {
  document.getElementById('todayDate').textContent = today().charAt(0).toUpperCase() + today().slice(1);
  const grid = document.getElementById('matchesGrid');
  if (!allMatches.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="es-icon">📭</div><div class="es-title">Aucun match</div></div>';
    return;
  }
  grid.innerHTML = allMatches.map(m => {
    const lg = LEAGUES[m.league] || { name: m.league, flag: '⚽' };
    const v = getVerdictInfo(m);
    const vsOrScore = m.live
      ? `<div class="mc-live-score">${m.liveScore}</div>`
      : `<div class="mc-vs">vs</div>`;
    const minuteEl = m.live ? `<div class="mc-minute">${m.minute}'</div>` : '';
    return `
    <div class="match-card" onclick="openAnalysis(${m.id})">
      <div class="mc-top">
        <div class="mc-league-badge">${lg.flag} ${lg.name}</div>
        <div class="mc-time-wrap">
          ${m.live ? '<div class="live-pill">LIVE</div>' : `<div class="mc-time">${m.time}</div>`}
        </div>
      </div>
      <div class="mc-body">
        <div class="mc-teams">
          <div class="mc-team"><div class="mc-name">${m.home}</div><div class="mc-full">${m.homeFull}</div></div>
          ${vsOrScore}
          <div class="mc-team right"><div class="mc-name">${m.away}</div><div class="mc-full">${m.awayFull}</div></div>
        </div>
        ${minuteEl}
        <div class="mc-proba" style="margin-top:${m.live?'6px':'0'}">
          <div class="p-h" style="width:${m.homeProba}%;"></div>
          <div class="p-d" style="width:${m.drawProba}%;"></div>
          <div class="p-a" style="width:${m.awayProba}%;"></div>
        </div>
        <div class="mc-verdict-wrap" style="margin-top:8px;">
          <div class="verdict-badge ${v.cls}">${v.icon} ${v.label}</div>
          <div class="mc-pcts">
            <span class="pct-h">${m.homeProba}%</span>
            <span class="pct-d">${m.drawProba}%</span>
            <span class="pct-a">${m.awayProba}%</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('cnt-today').textContent = allMatches.length;
}

// ══════════════════════════════════════════
// STANDINGS
// ══════════════════════════════════════════
async function showStandings(leagueId, skipNavUpdate) {
  currentLeagueForBack = leagueId;
  if (!skipNavUpdate) {
    showPage('standings');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const el = document.getElementById('nav-' + leagueId);
    if (el) el.classList.add('active');
  }

  document.getElementById('standingsContent').innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">CHARGEMENT DU CLASSEMENT...<br><span class="loading-step">${LEAGUES[leagueId]?.flag} ${LEAGUES[leagueId]?.name}</span></div></div>`;

  const lg = LEAGUES[leagueId];

  // Fetch standings via Claude AI
  const prompt = `Donne-moi le classement actuel ${lg.name} saison 2025-2026. Réponds UNIQUEMENT en JSON brut (pas markdown, pas backticks) :
{
  "league": "${lg.name}",
  "season": "2025-2026",
  "updatedAt": "<date approximative>",
  "teams": [
    {"pos":1,"name":"<equipe>","emoji":"<emoji drapeau ou foot>","played":<num>,"won":<num>,"drawn":<num>,"lost":<num>,"gf":<num>,"ga":<num>,"gd":<num>,"pts":<num>,"form":["W","W","D","L","W"],"zone":"ucl|uel|uecl|rel|none"}
  ]
}
Inclus les 18-20 équipes. Utilise tes vraies connaissances. JSON brut uniquement.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role:'user', content: prompt }] })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const standings = JSON.parse(clean);
    renderStandings(standings, leagueId);
  } catch(e) {
    renderFallbackStandings(leagueId);
  }
}

function renderStandings(s, leagueId) {
  const zoneColors = { ucl:'#29b6f6', uel:'#ffb300', uecl:'#ab47bc', rel:'#ff4444', none:'transparent' };
  const zoneTitles = { ucl:'Ligue des Champions', uel:'Europa League', uecl:'Conf. League', rel:'Relégation' };

  const zonesPresent = [...new Set(s.teams.filter(t=>t.zone!=='none').map(t=>t.zone))];

  const legend = zonesPresent.map(z => `
    <div class="zl-item">
      <div class="zl-dot" style="background:${zoneColors[z]};"></div>
      ${zoneTitles[z]||z}
    </div>`).join('');

  const rows = s.teams.map(t => {
    const posClass = t.zone === 'ucl' ? 'top3' : t.zone === 'uel' ? 'ucl' : t.zone === 'uecl' ? 'uecl' : t.zone === 'rel' ? 'rel' : '';
    const leftBorder = t.zone !== 'none' ? `style="border-left: 3px solid ${zoneColors[t.zone]};"` : '';
    const formDots = (t.form||[]).map(r => `<div class="sf-dot sf-${r.toLowerCase()}"></div>`).join('');
    return `
    <tr onclick="openTeam('${t.name}', '${leagueId}')" ${leftBorder}>
      <td class="s-pos ${posClass}">${t.pos}</td>
      <td><div class="s-team-cell"><div class="s-team-logo">${t.emoji||'⚽'}</div><div class="s-team-name">${t.name}</div></div></td>
      <td class="s-num">${t.played}</td>
      <td class="s-num">${t.won}</td>
      <td class="s-num">${t.drawn}</td>
      <td class="s-num">${t.lost}</td>
      <td class="s-num">${t.gf}</td>
      <td class="s-num">${t.ga}</td>
      <td class="s-num">${t.gd > 0 ? '+' : ''}${t.gd}</td>
      <td class="s-pts">${t.pts}</td>
      <td><div class="s-form">${formDots}</div></td>
    </tr>`;
  }).join('');

  document.getElementById('standingsContent').innerHTML = `
    <div class="page-title">${LEAGUES[leagueId]?.flag} ${s.league}</div>

async function openTeam(teamName, leagueId) {
  currentLeagueForBack = leagueId;
  showPage('team');
  document.getElementById('teamBackBtn').textContent = `← ${LEAGUES[leagueId]?.name || 'Classement'}`;
  document.getElementById('teamContent').innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">CHARGEMENT...<br><span class="loading-step">${teamName.toUpperCase()}</span><br>CALENDRIER COMPLET SAISON 2025-2026</div></div>`;

  const prompt = `Donne-moi le calendrier complet de ${teamName} pour la saison 2025-2026, toutes compétitions confondues (championnat, coupes nationales, compétitions européennes).
Réponds UNIQUEMENT en JSON brut :
{
  "team": "${teamName}",
  "league": "<championnat principal>",
  "season": "2025-2026",
  "position": <classement actuel>,
  "points": <points>,
  "played": <matchs joués>,
  "won": <victoires>,
  "drawn": <nuls>,
  "lost": <défaites>,
  "emoji": "<emoji représentatif>",
  "matches": [
    {
      "date": "JJ/MM/YYYY",
      "competition": "<Ligue 1|Champions League|Coupe de France|etc.>",
      "home": "<équipe domicile>",
      "away": "<équipe extérieur>",
      "venue": "H|A",
      "status": "played|live|upcoming",
      "score": "X-X ou null si à venir",
      "result": "W|D|L|null"
    }
  ]
}
Inclus TOUS les matchs de août 2025 à mai/juin 2026. Ordre chronologique. JSON brut uniquement.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role:'user', content: prompt }] })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const team = JSON.parse(clean);
    renderTeam(team);
  } catch(e) {
    document.getElementById('teamContent').innerHTML = `<div class="empty-state"><div class="es-icon">⚠️</div><div class="es-title">Données indisponibles</div><div class="es-sub">Impossible de charger le calendrier de ${teamName}.</div></div>`;
  }
}

function renderTeam(t) {
  let currentFilter = 'all';

  const compSet = [...new Set((t.matches||[]).map(m => m.competition))];

  function buildCalendar(filter) {
    const filtered = filter === 'all' ? t.matches : t.matches.filter(m => m.competition === filter);
    if (!filtered.length) return '<div class="empty-state"><div class="es-icon">📭</div><div class="es-title">Aucun match</div></div>';

    return filtered.map(m => {
      const compCls = COMP_CLASSES[m.competition] || 'comp-ucl';
      const isHome = m.venue === 'H';
      const opponent = isHome ? m.away : m.home;
      const venueLabel = isHome ? 'DOM' : 'EXT';
      const venueCls = isHome ? 'venue-h' : 'venue-a';
      const isLive = m.status === 'live';

      let scoreCls = 'score-future';
      let scoreDisplay = m.score || '—';
      if (m.status === 'played' && m.result) {
        scoreCls = m.result === 'W' ? 'score-win' : m.result === 'L' ? 'score-loss' : 'score-draw';
      }
      if (isLive) scoreCls = 'score-win';

      return `
      <div class="cal-row ${m.status === 'upcoming' ? 'future' : ''} ${isLive ? 'live-row' : ''}">
        <div class="cal-date">${m.date}</div>
        <div><span class="cal-comp ${compCls}">${m.competition}</span></div>
        <div class="cal-teams">
          ${isLive ? '<div class="live-pill" style="font-size:9px;">LIVE</div>' : ''}
          <span style="color:var(--text2);">${isHome ? `<strong style="color:var(--text)">${m.home}</strong> vs ${m.away}` : `${m.home} vs <strong style="color:var(--text)">${m.away}</strong>`}</span>
        </div>
        <div class="cal-score ${scoreCls}">${scoreDisplay}</div>
        <div class="cal-venue ${venueCls}">${venueLabel}</div>
      </div>`;
    }).join('');
  }

  const filterTabs = ['all', ...compSet].map(c => {
    const label = c === 'all' ? 'Tous' : c;
    return `<div class="cal-filter ${c==='all'?'active':''}" data-comp="${c}" onclick="calFilter(this, '${c}')">${label}</div>`;
  }).join('');

  document.getElementById('teamContent').innerHTML = `
    <div class="team-hero">
      <div class="team-hero-logo">${t.emoji || '⚽'}</div>
      <div>
        <div class="team-hero-name">${t.team}</div>
        <div class="team-hero-league">${t.league} · Saison ${t.season}</div>
      </div>
      <div class="team-hero-stats">
        <div class="ths-item"><div class="ths-val" style="color:var(--green)">${t.position || '—'}</div><div class="ths-label">Classement</div></div>
        <div class="ths-item"><div class="ths-val">${t.points || '—'}</div><div class="ths-label">Points</div></div>
        <div class="ths-item"><div class="ths-val" style="color:var(--green)">${t.won || '—'}</div><div class="ths-label">Victoires</div></div>
        <div class="ths-item"><div class="ths-val" style="color:var(--text2)">${t.drawn || '—'}</div><div class="ths-label">Nuls</div></div>
        <div class="ths-item"><div class="ths-val" style="color:var(--red)">${t.lost || '—'}</div><div class="ths-label">Défaites</div></div>
      </div>
    </div>

    <div class="section-label">Calendrier complet — Toutes compétitions</div>
    <div class="cal-filters" id="calFilters">${filterTabs}</div>
    <div class="cal-list" id="calList">${buildCalendar('all')}</div>
    <div class="disclaimer">Calendrier IA · Données au ${new Date().toLocaleDateString('fr-FR')} · Cliquer sur un match pour l'analyser</div>
  `;

  // Store buildCalendar fn for filter use
  window._buildCalendar = buildCalendar;
}

function calFilter(el, comp) {
  document.querySelectorAll('.cal-filter').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('calList').innerHTML = window._buildCalendar(comp);
}

// ANALYSIS
// ══════════════════════════════════════════
async function openAnalysis(matchId) {
  const match = allMatches.find(m => m.id === matchId);
  if (!match) return;
  currentAnalysisMatch = match;
  showPage('analysis');

  document.getElementById('analysisContent').innerHTML = `
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">
        ANALYSE APPROFONDIE EN COURS<br>
        <span class="loading-step">${match.homeFull.toUpperCase()} VS ${match.awayFull.toUpperCase()}</span><br><br>
        ↳ Forme récente toutes compétitions<br>
        ↳ Blessés et suspensions<br>
        ↳ Contexte championnat + européen<br>
        ↳ Historique confrontations<br>
        ↳ Dynamique de groupe
      </div>
    </div>`;

  await runAnalysis(match);

  // If live, start recalculating every 5 minutes
  if (match.live) {
    if (liveInterval) clearInterval(liveInterval);
    liveInterval = setInterval(() => {
      if (currentAnalysisMatch && currentAnalysisMatch.live) runAnalysis(currentAnalysisMatch, true);
    }, 300000);
  }
}

async function doSearch() {
  const val = document.getElementById('searchInput').value.trim();
  if (!val) return;
  const parts = val.split(/\s+vs\s+/i);
  if (parts.length < 2) { alert('Format: Équipe A vs Équipe B'); return; }
  const m = {
    id: Date.now(), league: 'search',
    home: parts[0].trim().toUpperCase().slice(0,12), homeFull: parts[0].trim(),
    away: parts[1].trim().toUpperCase().slice(0,12), awayFull: parts[1].trim(),
    time: '—', homeProba: 40, drawProba: 25, awayProba: 35, live: false
  };
  allMatches.push(m);
  await openAnalysis(m.id);
}

async function runAnalysis(match, isLiveUpdate) {
  if (!isLiveUpdate) {
    document.getElementById('analysisContent').innerHTML = `
      <div class="loading-wrap"><div class="spinner"></div>
      <div class="loading-text">ANALYSE EN COURS...<br><span class="loading-step">${match.homeFull.toUpperCase()} VS ${match.awayFull.toUpperCase()}</span><br><br>
      ↳ Recherche forme récente (toutes compétitions)<br>
      ↳ Analyse contexte championnat ET européen<br>
      ↳ Blessés, suspensions, fatigue<br>
      ↳ Calcul probabilités mis à jour</div></div>`;
  }

  const liveContext = match.live ? `\nSCORE ACTUEL: ${match.liveScore} à la ${match.minute}'` : '';
  const prompt = `Tu es un analyste football expert. Analyse ce match de façon TRÈS APPROFONDIE.
IMPORTANT: Ne regarde pas que la dernière performance en UCL ou en coupe. Analyse la forme RÉCENTE TOUTES COMPÉTITIONS CONFONDUES (championnat national + coupes + Europe). Un club peut très bien gagner en UCL mais perdre en championnat — cela compte dans l'analyse.
Match: ${match.homeFull} vs ${match.awayFull}
Compétition: ${LEAGUES[match.league]?.name || 'Inconnue'}${liveContext}

Réponds UNIQUEMENT en JSON brut (zéro markdown) :
{
  "homeProba": <number>,
  "drawProba": <number>,
  "awayProba": <number>,
  "verdictType": "home|draw|away",
  "verdictLabel": "<ex: Victoire PSG, Match nul probable, Victoire Bayern>",
  "verdictScenario": "<scénario le plus probable en 1 phrase ex: PSG gagne mais match serré>",
  "verdictDetail": "<analyse complète 3-4 phrases, contexte réel, forme championnat ET européen>",
  "liveAnalysis": ${match.live ? `"<analyse mi-temps si score ${match.liveScore} à ${match.minute}'"` : 'null'},
  "homePros": ["<atout 1>","<atout 2>","<atout 3>","<atout 4>"],
  "homeCons": ["<faiblesse 1>","<faiblesse 2>","<faiblesse 3>"],
  "awayPros": ["<atout 1>","<atout 2>","<atout 3>","<atout 4>"],
  "awayCons": ["<faiblesse 1>","<faiblesse 2>","<faiblesse 3>"],
  "homeForm": ["W","D","L","W","W"],
  "awayForm": ["W","W","L","W","D"],
  "homeFormNote": "<commentaire forme réelle incluant championnats ET coupes>",
  "awayFormNote": "<commentaire forme réelle incluant championnats ET coupes>",
  "homeAbsences": [{"name":"<joueur>","reason":"<raison>","impact":"high|med|low"}],
  "awayAbsences": [{"name":"<joueur>","reason":"<raison>","impact":"high|med|low"}],
  "keyPlayers": [{"team":"home|away","name":"<joueur>","stat":"<chiffre>","statLabel":"<label>"}],
  "history": [{"date":"<année>","comp":"<compétition>","home":"<équipe>","away":"<équipe>","score":"X-X","winner":"home|away|draw"}]
}
JSON brut uniquement. Sois factuel et précis.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}] })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const a = JSON.parse(text.replace(/```json|```/g,'').trim());
    renderAnalysis(match, a);
  } catch(e) {
    renderAnalysis(match, {
      homeProba:match.homeProba, drawProba:match.drawProba, awayProba:match.awayProba,
      verdictType:'home', verdictLabel:`Victoire ${match.home}`,
      verdictScenario:`${match.home} favoris à domicile`,
      verdictDetail:`Analyse en cours. Les données pour ce match n'ont pas pu être chargées complètement.`,
      liveAnalysis: null,
      homePros:['Avantage terrain','Support du public','Effectif solide'],
      homeCons:['Pression résultat'],
      awayPros:['Équipe organisée','Expérience'],
      awayCons:['Déplacement difficile'],
      homeForm:['W','W','D','W','L'], awayForm:['W','W','W','D','L'],
      homeFormNote:'Données non disponibles.',
      awayFormNote:'Données non disponibles.',
      homeAbsences:[], awayAbsences:[], keyPlayers:[], history:[]
    });
  }
}

function renderAnalysis(match, a) {
  const lg = LEAGUES[match.league] || { name:'Match', flag:'⚽' };
  const fMap = { W:['fd-w','V'], L:['fd-l','D'], D:['fd-d','N'] };
  const formDots = arr => (arr||[]).map(r => { const[c,l]=fMap[r]||['fd-d','?']; return `<div class="form-d ${c}">${l}</div>`; }).join('');
  const absRows = list => (!list||!list.length)
    ? '<div style="padding:8px 0;font-size:12px;color:var(--text3);">Aucune absence connue</div>'
    : list.map(p=>`<div class="abs-player"><div><div class="abs-name">${p.name}</div><div class="abs-reason">${p.reason}</div></div><div class="imp imp-${p.impact||'l'}">${p.impact==='high'?'ÉLEVÉ':p.impact==='med'?'MOYEN':'FAIBLE'}</div></div>`).join('');
  const histoRows = arr => (!arr||!arr.length)
    ? '<div style="padding:10px 16px;font-size:12px;color:var(--text3);">Aucun historique disponible</div>'
    : arr.map(h=>`<div class="h-row"><div class="h-date">${h.date}</div><div class="h-comp" style="font-size:11px;color:var(--text3);">${h.comp}</div><div class="h-teams">${h.home} vs ${h.away}</div><div class="h-score">${h.score}</div><div class="h-win ${h.winner==='home'?'h-home':h.winner==='away'?'h-away':'h-draw'}">${h.winner==='home'?match.home.slice(0,5):h.winner==='away'?match.away.slice(0,5):'NUL'}</div></div>`).join('');

  const vcCls = a.verdictType==='home' ? 'vc-win-home' : a.verdictType==='away' ? 'vc-win-away' : 'vc-draw';
  const vcIcon = a.verdictType==='home' ? '🔵' : a.verdictType==='away' ? '🔴' : '⚖️';

  const liveSection = (match.live && a.liveAnalysis) ? `
    <div class="analysis-card" style="margin-bottom:18px;border-color:rgba(255,68,68,0.3);background:rgba(255,68,68,0.04);">
      <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--red);text-transform:uppercase;margin-bottom:8px;">🔴 Analyse mi-temps — ${match.liveScore} à ${match.minute}'</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.7;">${a.liveAnalysis}</div>
    </div>` : '';

  const players = (a.keyPlayers||[]).map(p=>`
    <div class="analysis-card" style="padding:12px 14px;">
      <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;color:${p.team==='home'?'var(--blue)':'var(--red)'};">${p.team==='home'?match.home:match.away}</div>
      <div style="font-size:13px;color:var(--text);margin:4px 0;">${p.name}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--amber);">${p.stat}</div>
      <div style="font-size:10px;color:var(--text3);">${p.statLabel}</div>
    </div>`).join('');

  const liveHero = match.live ? `
    <div style="text-align:center;margin-bottom:4px;">
      <div class="ah-live-score">${match.liveScore}</div>
      <div class="ah-minute">${match.minute}'</div>
    </div>` : '';

  document.getElementById('analysisContent').innerHTML = `
    <div class="analysis-hero">
      <div class="ah-top">
        <div class="ah-team ah-home">
          <div class="ah-name">${match.home}</div>
          <div class="ah-full">${match.homeFull}</div>
        </div>
        <div class="ah-center">
          ${match.live ? '' : '<div class="ah-vs">VS</div>'}
          ${liveHero}
          <div class="ah-meta">${lg.flag} ${lg.name} · ${match.time}</div>
        </div>
        <div class="ah-team ah-away right">
          <div class="ah-name">${match.away}</div>
          <div class="ah-full">${match.awayFull}</div>
        </div>
      </div>
      <div class="bp-wrap">
        <div class="bp-track">
          <div class="bp-h" style="width:${a.homeProba}%;"></div>
          <div class="bp-d" style="width:${a.drawProba}%;"></div>
          <div class="bp-a" style="width:${a.awayProba}%;"></div>
        </div>
        <div class="bp-labels">
          <div class="bp-item"><div class="bp-dot" style="background:var(--blue);"></div><span class="bp-lbl">Victoire ${match.home}</span><span class="bp-pct pct-h">${a.homeProba}%</span></div>
          <div class="bp-item"><div class="bp-dot" style="background:var(--text3);"></div><span class="bp-lbl">Nul</span><span class="bp-pct pct-d">${a.drawProba}%</span></div>
          <div class="bp-item"><div class="bp-dot" style="background:var(--red);"></div><span class="bp-lbl">Victoire ${match.away}</span><span class="bp-pct pct-a">${a.awayProba}%</span></div>
        </div>
      </div>
    </div>

    <div class="verdict-card ${vcCls}">
      <div style="font-size:32px;">${vcIcon}</div>
      <div>
        <div class="vc-tag">Scénario le plus probable</div>
        <div class="vc-main">${a.verdictLabel} · ${a.verdictScenario}</div>
        <div class="vc-sub">${a.verdictDetail}</div>
      </div>
    </div>

    ${liveSection}

    <div class="section-label">Forme récente — Toutes compétitions</div>
    <div class="two-col" style="margin-bottom:18px;">
      <div class="analysis-card ac-home">
        <div class="ac-team">${match.home}</div>
        <div class="form-dots">${formDots(a.homeForm)}</div>
        <div class="form-note">${a.homeFormNote}</div>
      </div>
      <div class="analysis-card ac-away">
        <div class="ac-team">${match.away}</div>
        <div class="form-dots">${formDots(a.awayForm)}</div>
        <div class="form-note">${a.awayFormNote}</div>
      </div>
    </div>

    <div class="section-label">Facteurs déterminants</div>
    <div class="two-col">
      <div class="analysis-card ac-home">
        <div class="ac-team">${match.home}</div>
        ${(a.homePros||[]).map(f=>`<div class="f-item"><div class="f-dot f-g"></div>${f}</div>`).join('')}
        ${(a.homeCons||[]).map(f=>`<div class="f-item"><div class="f-dot f-r"></div>${f}</div>`).join('')}
      </div>
      <div class="analysis-card ac-away">
        <div class="ac-team">${match.away}</div>
        ${(a.awayPros||[]).map(f=>`<div class="f-item"><div class="f-dot f-g"></div>${f}</div>`).join('')}
        ${(a.awayCons||[]).map(f=>`<div class="f-item"><div class="f-dot f-r"></div>${f}</div>`).join('')}
      </div>
    </div>

    <div class="section-label" style="margin-top:18px;">Absences & incertains</div>
    <div class="two-col">
      <div class="analysis-card ac-home"><div class="ac-team">${match.home}</div>${absRows(a.homeAbsences)}</div>
      <div class="analysis-card ac-away"><div class="ac-team">${match.away}</div>${absRows(a.awayAbsences)}</div>
    </div>

    ${players ? `<div class="section-label" style="margin-top:18px;">Joueurs à surveiller</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:18px;">${players}</div>` : ''}

    <div class="section-label" style="margin-top:18px;">Historique des confrontations</div>
    <div class="histo-card">${histoRows(a.history)}</div>

    <div class="disclaimer">
      ANALYSE IA APPROFONDIE · FORME TOUTES COMPÉTITIONS · ${new Date().toLocaleDateString('fr-FR').toUpperCase()}<br>
      ${match.live ? '🔴 MISE À JOUR AUTOMATIQUE TOUTES LES 5 MIN PENDANT LE MATCH · ' : ''}DIVERTISSEMENT UNIQUEMENT · JOUER RESPONSABLEMENT
    </div>`;
}
